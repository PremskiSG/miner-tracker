# Where portfolio_alerts drops the filing PDFs (read in place, never copied).
filings_dir: /Users/premski/code/Claude_Code/portfolio_alerts/data/filings

extraction:
  provider: deepseek       # deepseek (Anthropic-compatible endpoint, PDF->text) | anthropic (native PDF)
  model: deepseek-v4-pro
  fallback_model:          # anthropic-only: escalate to e.g. claude-sonnet-5
  max_pages_primary: 100   # anthropic-only: docs longer than this go to the fallback model
  max_tokens: 8192
  # To switch to the Claude API later:
  #   provider: anthropic
  #   model: claude-haiku-4-5
  #   fallback_model: claude-sonnet-5

companies:
  - market: NORDIC
    ticker: SOSI1
    name: Sotkamo Silver
    reporting_currency: SEK
    fx_pair: SEKUSD
    metal: silver
    market_symbol: SOSI1.HE
  - market: AU
    ticker: BCN
    name: Beacon Minerals
    reporting_currency: AUD
    fx_pair: AUDUSD
    metal: gold
    market_symbol: BCN.AX
  - market: CA
    ticker: SOMA
    name: Soma Gold
    reporting_currency: CAD
    fx_pair: CADUSD
    metal: gold
    market_symbol: SOMA.V
  - market: CA
    ticker: THX
    name: Thor Explorations
    reporting_currency: USD      # Segilola (Nigeria) reports in USD -> no FX pair
    fx_pair:
    metal: gold
